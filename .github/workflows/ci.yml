name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rules-engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - name: Unit tests (deterministic rules engine)
        run: pytest tests/ -v

  agent-evals:
    runs-on: ubuntu-latest
    needs: rules-engine-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Agent evals (Gemini + tools, gated at 90% accuracy)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY secret not set — skipping agent evals."
          else
            python evals/run_evals.py
          fi
